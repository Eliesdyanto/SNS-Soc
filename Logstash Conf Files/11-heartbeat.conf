filter {
  if [agent][type] == "heartbeat" {
    mutate { add_tag => ["heartbeat"] }
    mutate {
      convert => { "[monitor][duration][us]" => "float" }
    }
  }
}

output {
  if "heartbeat" in [tags] {
    elasticsearch {
      hosts => ["http://192.168.0.76:9200"]
      index => "heartbeat-%{+YYYY.MM.dd}"
    }
  }
}
